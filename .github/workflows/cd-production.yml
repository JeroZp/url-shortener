name: CD Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: commit SHA)"
        required: false
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: url-shortener-backend
  ECR_FRONTEND_REPO: url-shortener-frontend
  TF_WORKING_DIR: infra/environments/production
  TF_VERSION: "1.9.8"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build & push
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_backend_url: ${{ steps.meta.outputs.backend_url }}
      ecr_frontend_url: ${{ steps.meta.outputs.frontend_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          for repo in "$ECR_BACKEND_REPO" "$ECR_FRONTEND_REPO"; do
            if ! aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              echo "Creating ECR repository: $repo"
              aws ecr create-repository \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true \
                --image-tag-mutability MUTABLE
            fi
          done

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::12}"
          fi
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "backend_url=$REGISTRY/$ECR_BACKEND_REPO" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$REGISTRY/$ECR_FRONTEND_REPO" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_url }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.backend_url }}:production-latest
          cache-from: type=gha,scope=backend-production
          cache-to: type=gha,scope=backend-production,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_url }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.frontend_url }}:production-latest
          cache-from: type=gha,scope=frontend-production
          cache-to: type=gha,scope=frontend-production,mode=max

  # ---------------------------------------------------------------------------
  # 2) IaC: terraform apply
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: Terraform apply (production)
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      alb_dns: ${{ steps.outputs.outputs.alb_dns }}
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      backend_service: ${{ steps.outputs.outputs.backend_service }}
      backend_green_service: ${{ steps.outputs.outputs.backend_green_service }}
      frontend_service: ${{ steps.outputs.outputs.frontend_service }}
      backend_family: ${{ steps.outputs.outputs.backend_family }}
      frontend_family: ${{ steps.outputs.outputs.frontend_family }}
      backend_blue_tg_arn: ${{ steps.outputs.outputs.backend_blue_tg_arn }}
      backend_green_tg_arn: ${{ steps.outputs.outputs.backend_green_tg_arn }}
      backend_api_rule_arn: ${{ steps.outputs.outputs.backend_api_rule_arn }}
      backend_health_rule_arn: ${{ steps.outputs.outputs.backend_health_rule_arn }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_lab_role_arn: ${{ secrets.LAB_ROLE_ARN }}
          TF_VAR_ecr_backend_url: ${{ needs.build-and-push.outputs.ecr_backend_url }}
          TF_VAR_ecr_frontend_url: ${{ needs.build-and-push.outputs.ecr_frontend_url }}
          TF_VAR_image_tag: ${{ needs.build-and-push.outputs.image_tag }}
          TF_VAR_db_password_secret_arn: ${{ secrets.DB_PASSWORD_SECRET_ARN }}
          TF_VAR_tf_state_bucket: url-shortener-tfstate-eafit-g3-v1
        run: terraform apply -auto-approve -input=false

      - name: Export terraform outputs
        id: outputs
        run: |
          set -euo pipefail
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "backend_service=$(terraform output -raw backend_service_name)" >> "$GITHUB_OUTPUT"
          echo "backend_green_service=$(terraform output -raw backend_green_service_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_service=$(terraform output -raw frontend_service_name)" >> "$GITHUB_OUTPUT"
          echo "backend_family=$(terraform output -raw backend_task_definition_family)" >> "$GITHUB_OUTPUT"
          echo "frontend_family=$(terraform output -raw frontend_task_definition_family)" >> "$GITHUB_OUTPUT"
          echo "backend_blue_tg_arn=$(terraform output -raw backend_blue_tg_arn)" >> "$GITHUB_OUTPUT"
          echo "backend_green_tg_arn=$(terraform output -raw backend_green_tg_arn)" >> "$GITHUB_OUTPUT"
          echo "backend_api_rule_arn=$(terraform output -raw backend_api_rule_arn)" >> "$GITHUB_OUTPUT"
          echo "backend_health_rule_arn=$(terraform output -raw backend_health_rule_arn)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 3) Blue/Green deploy backend + rolling deploy frontend
  #    - Detect which slot (blue/green) is currently active
  #    - Deploy new version to the INACTIVE slot
  #    - Switch ALB listener rules to the new slot
  #    - Record previous state for rollback
  # ---------------------------------------------------------------------------
  deploy:
    name: Blue/Green deploy
    needs: [build-and-push, terraform-apply]
    runs-on: ubuntu-latest
    outputs:
      previous_active_tg_arn: ${{ steps.bluegreen.outputs.previous_active_tg_arn }}
      new_active_tg_arn: ${{ steps.bluegreen.outputs.new_active_tg_arn }}
      previous_frontend_td: ${{ steps.previous.outputs.frontend_td }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Frontend: record previous TD and force rolling update -----------
      - name: Record previous frontend task definition
        id: previous
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          FRONTEND_SVC: ${{ needs.terraform-apply.outputs.frontend_service }}
        run: |
          set -euo pipefail
          FRONT=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$FRONTEND_SVC" \
            --query 'services[0].taskDefinition' --output text)
          echo "Previous frontend TD: $FRONT"
          echo "frontend_td=$FRONT" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend (rolling update)
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          SERVICE: ${{ needs.terraform-apply.outputs.frontend_service }}
          FAMILY: ${{ needs.terraform-apply.outputs.frontend_family }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$FAMILY" \
            --force-new-deployment >/dev/null

      # --- Backend: ensure both TGs are registered with ALB ----------------
      - name: Ensure both target groups are associated with ALB
        env:
          API_RULE: ${{ needs.terraform-apply.outputs.backend_api_rule_arn }}
          HEALTH_RULE: ${{ needs.terraform-apply.outputs.backend_health_rule_arn }}
          BLUE_TG: ${{ needs.terraform-apply.outputs.backend_blue_tg_arn }}
          GREEN_TG: ${{ needs.terraform-apply.outputs.backend_green_tg_arn }}
        run: |
          set -euo pipefail

          # Due to lifecycle { ignore_changes = [action] } in Terraform, the
          # listener rules may have drifted to reference only one TG. Re-register
          # both TGs so ECS can successfully deploy to either service.
          for RULE_ARN in "$API_RULE" "$HEALTH_RULE"; do
            TG_COUNT=$(aws elbv2 describe-rules \
              --rule-arns "$RULE_ARN" \
              --query 'length(Rules[0].Actions[0].ForwardConfig.TargetGroups)' \
              --output text 2>/dev/null || echo "0")

            if [ "$TG_COUNT" != "2" ]; then
              echo "Rule $RULE_ARN has $TG_COUNT TGs, re-registering both..."
              # Detect which TG currently has traffic
              ACTIVE=$(aws elbv2 describe-rules \
                --rule-arns "$RULE_ARN" \
                --query 'Rules[0].Actions[0].ForwardConfig.TargetGroups[?Weight>`0`].TargetGroupArn | [0]' \
                --output text 2>/dev/null || echo "")

              if [ "$ACTIVE" = "$GREEN_TG" ]; then
                W_BLUE=0; W_GREEN=100
              else
                W_BLUE=100; W_GREEN=0
              fi

              aws elbv2 modify-rule \
                --rule-arn "$RULE_ARN" \
                --actions '[{
                  "Type": "forward",
                  "ForwardConfig": {
                    "TargetGroups": [
                      {"TargetGroupArn": "'"$BLUE_TG"'", "Weight": '"$W_BLUE"'},
                      {"TargetGroupArn": "'"$GREEN_TG"'", "Weight": '"$W_GREEN"'}
                    ]
                  }
                }]'
              echo "Rule $RULE_ARN updated with both TGs."
            else
              echo "Rule $RULE_ARN already has both TGs registered."
            fi
          done

      # --- Backend: blue/green switch --------------------------------------
      - name: Determine active slot and deploy to inactive
        id: bluegreen
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          BLUE_SVC: ${{ needs.terraform-apply.outputs.backend_service }}
          GREEN_SVC: ${{ needs.terraform-apply.outputs.backend_green_service }}
          FAMILY: ${{ needs.terraform-apply.outputs.backend_family }}
          BLUE_TG: ${{ needs.terraform-apply.outputs.backend_blue_tg_arn }}
          GREEN_TG: ${{ needs.terraform-apply.outputs.backend_green_tg_arn }}
          API_RULE: ${{ needs.terraform-apply.outputs.backend_api_rule_arn }}
        run: |
          set -euo pipefail

          # 1. Query the current listener rule to find which TG is active
          #    With weighted forward, TargetGroupArn is at ForwardConfig level, not Action level
          CURRENT_TG=$(aws elbv2 describe-rules \
            --rule-arns "$API_RULE" \
            --query 'Rules[0].Actions[0].ForwardConfig.TargetGroups[?Weight>`0`].TargetGroupArn | [0]' \
            --output text)
          echo "Currently active TG: $CURRENT_TG"
          echo "previous_active_tg_arn=$CURRENT_TG" >> "$GITHUB_OUTPUT"

          # 2. Determine which slot to deploy to (the inactive one)
          if [ "$CURRENT_TG" = "$BLUE_TG" ]; then
            DEPLOY_SVC="$GREEN_SVC"
            NEW_TG="$GREEN_TG"
            echo "Active slot: BLUE → deploying to GREEN"
          else
            DEPLOY_SVC="$BLUE_SVC"
            NEW_TG="$BLUE_TG"
            echo "Active slot: GREEN → deploying to BLUE"
          fi
          echo "new_active_tg_arn=$NEW_TG" >> "$GITHUB_OUTPUT"

          # 3. Update the INACTIVE service with the new task definition
          echo "Updating $DEPLOY_SVC with latest $FAMILY..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$DEPLOY_SVC" \
            --task-definition "$FAMILY" \
            --force-new-deployment >/dev/null

      - name: Wait for inactive backend service to stabilize
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          BLUE_SVC: ${{ needs.terraform-apply.outputs.backend_service }}
          GREEN_SVC: ${{ needs.terraform-apply.outputs.backend_green_service }}
          BLUE_TG: ${{ needs.terraform-apply.outputs.backend_blue_tg_arn }}
          PREVIOUS_TG: ${{ steps.bluegreen.outputs.previous_active_tg_arn }}
        run: |
          set -euo pipefail
          if [ "$PREVIOUS_TG" = "$BLUE_TG" ]; then
            WAIT_SVC="$GREEN_SVC"
          else
            WAIT_SVC="$BLUE_SVC"
          fi
          echo "Waiting for $WAIT_SVC to become stable..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$WAIT_SVC"

      - name: Switch ALB listener rules to new slot
        env:
          API_RULE: ${{ needs.terraform-apply.outputs.backend_api_rule_arn }}
          HEALTH_RULE: ${{ needs.terraform-apply.outputs.backend_health_rule_arn }}
          BLUE_TG: ${{ needs.terraform-apply.outputs.backend_blue_tg_arn }}
          GREEN_TG: ${{ needs.terraform-apply.outputs.backend_green_tg_arn }}
          NEW_TG: ${{ steps.bluegreen.outputs.new_active_tg_arn }}
        run: |
          set -euo pipefail

          # Use weighted forward to keep BOTH target groups associated with the ALB.
          # The inactive TG gets weight 0 so it receives no traffic but stays registered.
          if [ "$NEW_TG" = "$GREEN_TG" ]; then
            ACTIVE_TG="$GREEN_TG"
            INACTIVE_TG="$BLUE_TG"
          else
            ACTIVE_TG="$BLUE_TG"
            INACTIVE_TG="$GREEN_TG"
          fi

          echo "Switching API rule to $ACTIVE_TG (keeping $INACTIVE_TG registered with weight 0)..."
          aws elbv2 modify-rule \
            --rule-arn "$API_RULE" \
            --actions '[{
              "Type": "forward",
              "ForwardConfig": {
                "TargetGroups": [
                  {"TargetGroupArn": "'"$ACTIVE_TG"'", "Weight": 100},
                  {"TargetGroupArn": "'"$INACTIVE_TG"'", "Weight": 0}
                ]
              }
            }]'

          echo "Switching health rule to $ACTIVE_TG (keeping $INACTIVE_TG registered with weight 0)..."
          aws elbv2 modify-rule \
            --rule-arn "$HEALTH_RULE" \
            --actions '[{
              "Type": "forward",
              "ForwardConfig": {
                "TargetGroups": [
                  {"TargetGroupArn": "'"$ACTIVE_TG"'", "Weight": 100},
                  {"TargetGroupArn": "'"$INACTIVE_TG"'", "Weight": 0}
                ]
              }
            }]'

          echo "Traffic switched successfully!"

      - name: Wait for frontend to stabilize
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          FRONTEND_SVC: ${{ needs.terraform-apply.outputs.frontend_service }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$FRONTEND_SVC"

  # ---------------------------------------------------------------------------
  # 4) Smoke tests against the ALB (now hitting the new backend slot)
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests (production)
    needs: [terraform-apply, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install smoke test dependencies
        working-directory: tests/smoke
        run: pip install -r requirements.txt

      - name: Run smoke tests
        working-directory: tests/smoke
        env:
          BASE_URL: http://${{ needs.terraform-apply.outputs.alb_dns }}
          SMOKE_BOOT_WAIT: "48"
        run: pytest -v --tb=short

      - name: Print ALB URL
        if: always()
        run: echo "production ALB → http://${{ needs.terraform-apply.outputs.alb_dns }}"

  # ---------------------------------------------------------------------------
  # 5) Automatic rollback — switch ALB back to the previous slot
  #    This is instant because the old version is still running!
  # ---------------------------------------------------------------------------
  rollback:
    name: Automatic rollback (blue/green switch-back)
    needs: [terraform-apply, deploy, smoke-tests]
    if: failure() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Switch ALB back to previous slot
        env:
          API_RULE: ${{ needs.terraform-apply.outputs.backend_api_rule_arn }}
          HEALTH_RULE: ${{ needs.terraform-apply.outputs.backend_health_rule_arn }}
          BLUE_TG: ${{ needs.terraform-apply.outputs.backend_blue_tg_arn }}
          GREEN_TG: ${{ needs.terraform-apply.outputs.backend_green_tg_arn }}
          PREVIOUS_TG: ${{ needs.deploy.outputs.previous_active_tg_arn }}
        run: |
          set -euo pipefail

          if [ "$PREVIOUS_TG" = "$GREEN_TG" ]; then
            ACTIVE_TG="$GREEN_TG"
            INACTIVE_TG="$BLUE_TG"
          else
            ACTIVE_TG="$BLUE_TG"
            INACTIVE_TG="$GREEN_TG"
          fi

          echo "ROLLBACK: Switching API rule back to $ACTIVE_TG (keeping $INACTIVE_TG with weight 0)..."
          aws elbv2 modify-rule \
            --rule-arn "$API_RULE" \
            --actions '[{
              "Type": "forward",
              "ForwardConfig": {
                "TargetGroups": [
                  {"TargetGroupArn": "'"$ACTIVE_TG"'", "Weight": 100},
                  {"TargetGroupArn": "'"$INACTIVE_TG"'", "Weight": 0}
                ]
              }
            }]'

          echo "ROLLBACK: Switching health rule back to $ACTIVE_TG (keeping $INACTIVE_TG with weight 0)..."
          aws elbv2 modify-rule \
            --rule-arn "$HEALTH_RULE" \
            --actions '[{
              "Type": "forward",
              "ForwardConfig": {
                "TargetGroups": [
                  {"TargetGroupArn": "'"$ACTIVE_TG"'", "Weight": 100},
                  {"TargetGroupArn": "'"$INACTIVE_TG"'", "Weight": 0}
                ]
              }
            }]'

          echo "Traffic reverted to previous slot!"

      - name: Rollback frontend to previous task definition
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          SERVICE: ${{ needs.terraform-apply.outputs.frontend_service }}
          PREVIOUS_TD: ${{ needs.deploy.outputs.previous_frontend_td }}
        run: |
          echo "Rolling back frontend to $PREVIOUS_TD"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$PREVIOUS_TD" \
            --force-new-deployment >/dev/null

      - name: Wait for rollback stable
        env:
          CLUSTER: ${{ needs.terraform-apply.outputs.cluster_name }}
          FRONTEND_SVC: ${{ needs.terraform-apply.outputs.frontend_service }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$FRONTEND_SVC"

      - name: Fail the workflow
        run: |
          echo "::error::Smoke tests failed. Backend rolled back via blue/green switch. Frontend rolled back to previous TD."
          exit 1