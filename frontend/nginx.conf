server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — every non-file path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* and /s/* are NOT proxied here. In production the ALB routes them
    # directly to the backend target group based on listener rules.
    # In local docker-compose, nginx serves everything and the backend is reached
    # via the host-mapped ports.
}
