[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C90", "N", "UP", "S"]
ignore = [
    "S101", # Allow asserts (necesary on tests)
    "B008", # FastAPI use Depends() in args by design
]  

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "N806"]  # tests may use hardcoded values

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["app"]
omit = ["app/__init__.py"]

[tool.coverage.report]
fail_under = 70
show_missing = true